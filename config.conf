# ------------------------------------------------------------
# MangoWC config.conf  (clean + Noctalia-friendly)
# ------------------------------------------------------------

# Help shells/portals detect the compositor properly
env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_DESKTOP,mango

# Export environment to DBus/systemd user services (launchers, portals, etc.)
exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user import-environment --all

# Optional: only if you actually use this target
exec-once=systemctl --user start graphical-session.target

# Start Noctalia
#exec-once=qs -c noctalia-shell

# Start OSD (ONLY if you are not also starting it in autostart.sh)
#exec-once=swayosd-server -s ~/.config/swayosd/style.css

# This file just sources the real config from conf.d/
# (00-env.conf also runs autostart.sh via exec-once)
source=./conf.d/00-env.conf
source=./conf.d/10-effects.conf
source=./conf.d/20-animations.conf
source=./conf.d/30-layout.conf
source=./conf.d/40-input.conf
source=./conf.d/45-appearance.conf

# Noctalia generates this file from the current wallpaper/theme.
# Load it after the static appearance defaults so its dynamic colours win.
source=./noctalia.conf

source=./conf.d/50-monitors.conf
source=./conf.d/60-tagrules.conf
source=./conf.d/70-windowrules.conf

# Keybindings
source=./conf.d/binds/00-system.conf
source=./conf.d/binds/10-launchers-apps.conf
source=./conf.d/binds/20-windows.conf
source=./conf.d/binds/25-ui.conf
source=./conf.d/binds/30-navigation.conf
source=./conf.d/binds/40-tags.conf
source=./conf.d/binds/50-monitors.conf
source=./conf.d/binds/60-pointer.conf
source=./conf.d/binds/70-display-layouts.conf

# Always safe to keep present (can be empty).
source=./conf.d/99-local.conf

# This sources the noctalia theme

source = ./noctalia.conf

