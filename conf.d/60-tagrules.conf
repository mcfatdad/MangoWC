# ============================================================
# Tag rules
# ============================================================
# Keep all 9 Mango tags visible on both monitors, even when empty.
# Mango uses 9 tags by default. Noctalia can only show the tags Mango exposes.
#
# HDMI-A-1 Tag 9 is the gaming tag and uses scroller.
# DP-3 Tag 9 deliberately remains dwindle.

# DP-3 left monitor: persistent tags 1-9.
tagrule=id:1,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:2,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:3,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:4,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:5,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:6,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:7,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:8,monitor_name:DP-3,no_hide:1,layout_name:dwindle
tagrule=id:9,monitor_name:DP-3,no_hide:1,layout_name:dwindle

# HDMI-A-1 right monitor: persistent tags 1-9.
tagrule=id:1,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:2,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:3,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:4,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:5,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:6,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:7,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:8,monitor_name:HDMI-A-1,no_hide:1,layout_name:dwindle
tagrule=id:9,monitor_name:HDMI-A-1,no_hide:1,layout_name:scroller
