# Split from original config.conf (2026-01-13 17:55:57Z UTC)
# Original: config.conf



# ==========================================================
# SYSTEM
# ==========================================================
bind=SUPER+CTRL,r,reload_config

# --- Session / Power ---
# Lock (needs a locker installed; swaylock shown here)
bind=SUPER+CTRL,O,spawn_shell,swaylock -f
# Suspend
bind=SUPER+CTRL,S,spawn_shell,systemctl suspend
# Hibernate (only works if hibernate is configured)
bind=SUPER+CTRL,H,spawn_shell,systemctl hibernate
# Shutdown / Poweroff
bind=SUPER+CTRL,P,spawn_shell,systemctl poweroff
# Logout (quit MangoWC back to your display manager / tty)
bind=SUPER+CTRL,L,quit
# Optional: reboot (handy if that “logout” was meant to be restart)
bind=SUPER+CTRL,R,spawn_shell,systemctl reboot

# Update System
bind=SUPER+CTRL,u,spawn_shell,mango-run update-system

# System Resources/Processes
bind=SUPER+CTRL,p,spawn_shell,mango-run system-performance

keymode=common
# Noctalia IPC helper
# Audio (output)
bindls=NONE,code:123,spawn_shell,qs -c noctalia-shell ipc volume increase
bindls=NONE,code:122,spawn_shell,qs -c noctalia-shell ipc volume decrease
bindls=NONE,code:121,spawn_shell,qs -c noctalia-shell ipc volume muteOutput
keymode=default
# Mic (input)
bindl=NONE,XF86AudioMicMute,spawn,~/.config/mango/scripts/noctalia-ipc volume muteInput

# Media
bindl=NONE,XF86AudioPlay,spawn,~/.config/mango/scripts/noctalia-ipc media playPause
bindl=NONE,XF86AudioPause,spawn,~/.config/mango/scripts/noctalia-ipc media pause
bindl=NONE,XF86AudioNext,spawn,~/.config/mango/scripts/noctalia-ipc media next
bindl=NONE,XF86AudioPrev,spawn,~/.config/mango/scripts/noctalia-ipc media previous

# Brightness
bindl=NONE,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/noctalia-ipc brightness increase
bindl=NONE,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/noctalia-ipc brightness decrease

bindlrs=NONE,XF86AudioMute,spawn_shell,sh -lc '/usr/bin/qs -c noctalia-shell ipc volume muteOutput >>/tmp/noctalia-ipc.log 2>&1'
