# Split from original config.conf (2026-01-13 17:55:57Z UTC)
# Original: config.conf

bind=SUPER,BackSpace,spawn_shell,bash -lc 'date >> /tmp/mango-keybind.log; echo "PATH=$PATH" >> /tmp/mango-keybind.log; command -v mango-run >> /tmp/mango-keybind.log; command -v mmsg >> /tmp/mango-keybind.log'

# =============================
# Windows (from windows.conf)
# =============================
bind=SUPER,q,killclient

bind=SUPER,f,togglefullscreen
bind=SUPER,m,togglemaximizescreen
bind=SUPER,t,togglefloating
bind=SUPER+SHIFT,t,spawn-shell,float-all-windows
#bind=SUPER+SHIFT,z,spawn_shell,${XDG_CONFIG_HOME:-$HOME/.config}/mango/scripts/toggle-all-floating

# Focus movement
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Swap tiled windows
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Switch tags by scrolling while holding Super
mousebind=SUPER,Up,focusdir,right
mousebind=SUPER,Down,focusdir,left

# Drag floating windows (grab anywhere in the window)
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Resize floating window in small steps (width,height)
# (negative shrinks, positive grows)
bind=SUPER+CTRL,Left,resizewin,-40,0
bind=SUPER+CTRL,Right,resizewin,+40,0
bind=SUPER+CTRL,Up,resizewin,0,-40
bind=SUPER+CTRL,Down,resizewin,0,+40

# Smart resize floating window (auto sizing)
bind=SUPER+ALT,Left,smartresizewin,left
bind=SUPER+ALT,Right,smartresizewin,right
bind=SUPER+ALT,Up,smartresizewin,up
bind=SUPER+ALT,Down,smartresizewin,down

# Alt+Tab cycling
bind=ALT,Tab,focusstack,next
bind=ALT+SHIFT,Tab,focusstack,prev

# Manage Masters
bind=SUPER,+,incnmaster,+1
bind=SUPER,-,incnmaster,-1


