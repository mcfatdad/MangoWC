# =============================
# User Interface
# =============================


# Capture Screens
bind=SUPER,Print,spawn_shell,mango-run capture-all-screens
bind=SUPER+SHIFT,Print,spawn_shell,mango-run capture-part-screen
bind=SUPER+CTRL,Print,spawn_shell,mango-run capture-current-screen
bind=SUPER+ALT,Print,spawn_shell,mango-run capture-separate-screens

#bind=SUPER+CTRL,e,spawn_shell,sh -c 'command -v $HOME/.config/mango/scripts/toggle-all-floating && notify-send "Mango" "bind fired"'


# Nocatalia Shell Settings
# =========================

# Toggle Noctalia dock (same key shows/hides)
bind=SUPER+CTRL,d,spawn,noctalia-shell ipc call dock toggle

# Clipper (Noctalia clipboard panel)
bind=SUPER+CTRL,v,spawn,noctalia-shell ipc call launcher clipboard

# Nocatalia Settings
bind=SUPER+CTRL,s,spawn,noctalia-shell ipc call settings toggle

# Wallpaper Selector
bind=SUPER+CTRL,w,spawn,noctalia-shell ipc call wallpaper toggle

# Toggle Bar
bind=SUPER+CTRL,b,spawn,noctalia-shell ipc call bar toggle

# Dark Mode
bind=SUPER+CTRL,m,spawn,noctalia-shell ipc call darkMode toggle

# Calendar
bind=SUPER+CTRL,t,spawn,noctalia-shell ipc call calendar toggle

# Session Menu: logout, lock, suspend, reboot and poweroff
bind=SUPER+CTRL,p,spawn,noctalia-shell ipc call sessionMenu toggle

# Lock Screen
bind=SUPER+CTRL,l,spawn,noctalia-shell ipc call lockScreen lock

# Notifications History
bind=SUPER+CTRL,n,spawn,noctalia-shell ipc call notifications toggleHistory

# Control Centre
bind=SUPER+CTRL,c,spawn,noctalia-shell ipc call controlCenter toggle

# Temporarily enlarge the mouse cursor so it is easy to locate.
# Press the same shortcut again to restore the normal size.
bind=SUPER+CTRL,g,spawn_shell,mango-run find-cursor
