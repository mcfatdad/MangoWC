# Split from original config.conf (2026-01-13 17:55:57Z UTC)
# Original: config.conf

# FIX: Keyboard “resize” replacement (Mango-native layout sizing)
# Master area wider/narrower
bind=SUPER+ALT,h,setmfact,-10
bind=SUPER+ALT,l,setmfact,+10
# Number of master windows
bind=SUPER+ALT,equal,incnmaster,+1
bind=SUPER+ALT,minus,incnmaster,-1


# ============================================================
# Mouse window movement / resizing
# ============================================================



# Hold Super + right-click drag:
# Resize the focused window.
mousebind=SUPER,btn_right,moveresize,curresize

# Optional:
# Super + Ctrl + right-click closes the focused window.
mousebind=SUPER+CTRL,btn_right,killclient
