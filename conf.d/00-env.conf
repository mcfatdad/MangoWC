# Split from original config.conf (2026-01-13 17:55:57Z UTC)
# Original: config.conf

# More option see https://github.com/DreamMaoMao/mango/wiki/


# -----------------------------
# Paths (Hypr variables -> Mango env)
# -----------------------------

env=MYAPPS,.config/mango/scripts/APPS
env=MYSCRIPTS,.config/mango/scripts
# Set before Mango fully initialises (and resets on config reload)


# XWayland display for X11 apps (Steam etc.)
env=DISPLAY,:1
env=XAUTHORITY,~/.Xauthority
# Identify the session (helps xdg-desktop-portal pick the right backend)
env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,wlroots
env=XDG_SESSION_DESKTOP,wlroots
# Prefer native Wayland for toolkits (with sane fallbacks)
env=GDK_BACKEND,wayland,x11,*
env=QT_QPA_PLATFORM,wayland;xcb

# Cursor QoL
env=XCURSOR_SIZE,24
env=XCURSOR_THEME,Bibata-Modern-Classic

exec-once=~/.config/mango/autostart.sh
