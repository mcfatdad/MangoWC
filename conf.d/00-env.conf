# -----------------------------
# SETUP VARIABLES
# -----------------------------

#env=MANGO,$HOME/.config/mango
#env=MYSCRIPTS,$MANGO/scripts
#env=MYAPPS,$MYSCRIPTS/APPS

# Set before Mango fully initialises (and resets on config reload)

# XWayland display for X11 apps
#env=DISPLAY,:0

# Do NOT use this:
# env=XAUTHORITY,~/.Xauthority

# Either omit XAUTHORITY entirely, or use an absolute path:
# env=XAUTHORITY,/home/mcfatdad/.Xauthority

env=XDG_SESSION_TYPE,wayland
env=XDG_CURRENT_DESKTOP,wlroots
env=XDG_SESSION_DESKTOP,wlroots
env=MOZ_ENABLE_WAYLAND,1

#env=GDK_BACKEND,wayland,x11,*
#env=QT_QPA_PLATFORM,wayland;xcb
#env=PROTON_ENABLE_WAYLAND,1
#env=MOZ_ENABLE_WAYLAND,1
#env=NIXOS_OZONE_WL,1

exec-once=systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP DBUS_SESSION_BUS_ADDRESS XAUTHORITY
exec-once=dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP DBUS_SESSION_BUS_ADDRESS XAUTHORITY


# Cursor QoL
#env=XCURSOR_SIZE,24
#env=XCURSOR_THEME,Bibata-Modern-Classic

exec-once=~/.config/mango/autostart.sh
