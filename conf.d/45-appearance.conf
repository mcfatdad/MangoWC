# ============================================================
# Appearance
# ============================================================
# Borders, gaps and colours only. Window effects are defined in
# 10-effects.conf so they cannot silently override one another.

# ------------------------------------------------------------
# Gaps and borders
# ------------------------------------------------------------
borderpx=2
gappih=5
gappiv=5
gappoh=5
gappov=5

# ------------------------------------------------------------
# Scratchpad sizing
# ------------------------------------------------------------
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# ------------------------------------------------------------
# Colours
# ------------------------------------------------------------
rootcolor=0x11111bff
bordercolor=0x313244ff
focuscolor=0x89b4faff
urgentcolor=0xf38ba8ff
dropcolor=0x89b4fa55
maximizescreencolor=0xa6e3a1ff
scratchpadcolor=0x89b4faff
globalcolor=0xcba6f7ff
overlaycolor=0x94e2d5ff
