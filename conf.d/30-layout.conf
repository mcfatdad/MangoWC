# ============================================================
# Layout behaviour
# ============================================================

# Allow SUPER + left-drag to exchange tiled window positions
# instead of leaving the dragged window floating
drag_tile_to_tile=1

# Super + Tab can cycle through every supported MangoWM layout when
# bound to switch_layout. Direct F-key bindings live in binds/.
# circle_layout=tile,center_tile,right_tile,vertical_tile,grid,vertical_grid,fair,vertical_fair,deck,vertical_deck,dwindle,scroller,vertical_scroller,monocle

# ------------------------------------------------------------
# Master-stack layouts
# tile, center_tile, right_tile, vertical_tile
# ------------------------------------------------------------
new_is_master=1
default_mfact=0.58
default_nmaster=1
smartgaps=0
center_master_overspread=1
center_when_single_stack=1

# ------------------------------------------------------------
# Scroller layouts
# scroller, vertical_scroller
# ------------------------------------------------------------
scroller_structs=28
scroller_default_proportion=0.88
scroller_prefer_overspread=0
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=0
scroller_default_proportion_single=0.96
scroller_proportion_preset=0.50,0.62,0.75,0.88,1.00

# =============================
# Dwindle layout
# =============================

dwindle_split_ratio=0.5

# Use predictable automatic recursive splitting rather than cursor-driven
# placement. New side-by-side windows appear on the right; new top/bottom
# windows appear below.
dwindle_smart_split=0
dwindle_hsplit=1
dwindle_vsplit=1

# Do not retain an unusual sibling orientation after a window closes.
dwindle_preserve_split=0

# Keep resizing conventional and predictable.
dwindle_smart_resize=0

# Use a simple two-zone drag-to-tile preview.
dwindle_drop_simple_split=1

# Keep automatic Dwindle behaviour rather than i3-style manual splitting.
dwindle_manual_split=0
