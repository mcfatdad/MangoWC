# ============================================================
# Window effects
# ============================================================
# Application-window effects remain enabled. Layer-shell surfaces
# are left to Noctalia so its panels and notifications render cleanly.

# ------------------------------------------------------------
# Blur
# ------------------------------------------------------------
blur=1
blur_layer=0

# Use the non-optimized blur path while isolating the shell-layer issue.
# This favours correctness over the small performance benefit of the
# optimized path.
blur_optimized=0
blur_params_radius=5
blur_params_num_passes=1
blur_params_noise=0.02
blur_params_brightness=0.92
blur_params_contrast=0.92
blur_params_saturation=1.15

# ------------------------------------------------------------
# Shadows
# ------------------------------------------------------------
shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=5
shadows_blur=8
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000aa

# ------------------------------------------------------------
# Opacity and rounded corners
# ------------------------------------------------------------
border_radius=5
# border_radius_location_default is not supported by the current MangoWM build.
# border_radius_location_default=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.96
