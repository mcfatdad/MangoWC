# Steam main client
# Open on HDMI-A-1 Tag 9 without switching to it.
# Fake maximised = fills usable screen area while keeping Noctalia bars visible.
# Steam main client
# AppID-only rules prevent file managers/folders titled Library or Steam being caught.
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,force_tiled_state:1,force_fakemaximize:1,scroller_proportion:1.0,appid:^(steam|Steam|steamwebhelper|com\.valvesoftware\.Steam)$

# Steam / Proton game windows
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^steam_app_[0-9]+$
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^(gamescope|gamescope-wsi)$

# Game launchers
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,force_fakemaximize:1,appid:^(lutris|net\.lutris\.Lutris|heroic|com\.heroicgameslauncher\.hgl)$

# ============================================================
# Window rules
# ============================================================
# Steam and games are routed to HDMI-A-1 Tag 9.
#
# Important behaviour:
# - Do not use "steam -silent" in the launcher; that starts Steam in the tray only.
# - Use istagsilent on Steam so Mango does not switch to Tag 9 when Steam maps.
# - Keep appid-only and title-only rules separate. If both are in one rule, both
#   must match, which is too fragile for Steam.

# -----------------------------
# Steam client
# -----------------------------
# Steam should open on HDMI-A-1 Tag 9, maximised inside the normal usable area.
# Do not use isfakefullscreen for the Steam client itself; that is for games.
# scroller_proportion:1.0 gives full width in the scroller layout.
#  prevents the fast Steam popup from visibly zooming across tags.

# -----------------------------
# Steam / Proton game windows
# -----------------------------
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^steam_app_[0-9]+$
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^(gamescope|gamescope-wsi)$

# Native launchers that often start games.
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,force_fakemaximize:1,force_tiled_state:1,appid:^(lutris|net\.lutris\.Lutris|heroic|com\.heroicgameslauncher\.hgl)$

# -----------------------------
# Per-game overrides
# -----------------------------
# Add stubborn games here after checking their appid/title with:
#   mmsg -g -c
# Example:
# windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,title:^Anno 1800$
