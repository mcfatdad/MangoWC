# Steam main client
# Opens on HDMI-A-1 Tag 9 without switching to it.
# Fake maximised fills the usable screen area while keeping Noctalia bars visible.
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,force_tiled_state:1,force_fakemaximize:1,scroller_proportion:1.0,appid:^(steam|Steam|steamwebhelper|com\.valvesoftware\.Steam)$

# Steam / Proton game windows
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^steam_app_[0-9]+$
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,appid:^(gamescope|gamescope-wsi)$

# Game launchers
windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,force_fakemaximize:1,force_tiled_state:1,appid:^(lutris|net\.lutris\.Lutris|heroic|com\.heroicgameslauncher\.hgl)$

# Per-game overrides
# -----------------------------
# Add stubborn games here after checking their appid/title with:
#   mmsg get focusing-client
# Example:
# windowrule=tags:9,monitor:HDMI-A-1,istagsilent:1,isfakefullscreen:1,force_fakemaximize:1,force_tiled_state:1,title:^Anno 1800$
