# Split from original config.conf (2026-01-13 17:55:57Z UTC)
# Original: config.conf

# layout support:

# Steam main client
windowrule=monitor:HDMI-A-1,appid:^steam$

# Catch common Steam popup/update windows by title
windowrule=monitor:HDMI-A-1,title:^Steam$
windowrule=monitor:HDMI-A-1,title:^Updating Steam$

# Stop the updater window from stretching across both monitors
windowrule=isfloating:1,width:1100,height:760,noopenmaximized:1,monitor:HDMI-A-1,title:^Updating Steam$
