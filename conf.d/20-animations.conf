# ============================================================
# Animations
# ============================================================
# Window animations remain enabled. Layer animations are also kept
# enabled so launchers and Noctalia surfaces can open smoothly; blur
# and shadows for those surfaces are disabled in 10-effects.conf.

animations=1
layer_animations=1

animation_type_open=zoom
animation_type_close=fade
layer_animation_type_open=slide
layer_animation_type_close=fade

animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.55
fadeout_begin_opacity=0.70

zoom_initial_ratio=0.88
zoom_end_ratio=1.00

animation_duration_move=350
animation_duration_open=350
animation_duration_tag=350
animation_duration_close=150
animation_duration_focus=120

animation_curve_open=0.3,1.0,1.0,1.0
animation_curve_move=0.3,1.0,1.0,1.0
animation_curve_tag=0.16,1.0,0.3,1.0
animation_curve_close=0.4,0.0,0.2,1.0
animation_curve_focus=0.16,1.0,0.3,1.0
animation_curve_opafadein=0.16,1.0,0.3,1.0
animation_curve_opafadeout=0.4,0.0,0.2,1.0

tag_animation_direction=1

# Layer-shell rules
# ------------------------------------------------------------
# Noctalia draws its own translucent panels, notifications and dimming
# surfaces. Prevent Mango from adding a second blur/shadow pass to them.
# Mango layer rules support regex matching.
layerrule=noblur:1,noshadow:1,layer_name:.*

# Mango's upstream example config treats this dimming layer specially.
# Do not animate, blur or shadow it while shell panels are opened.
layerrule=noblur:1,noanim:1,noshadow:1,layer_name:dimland_layer

# Rofi can still use a compositor opening animation, but not layer blur.
layerrule=animation_type_open:slide,animation_type_close:slide,layer_name:.*rofi.*

# Keep screenshot selection overlays stable.
layerrule=noanim:1,noblur:1,noshadow:1,animation_type_open:none,animation_type_close:none,layer_name:selection
